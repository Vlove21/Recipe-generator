<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="src/stle.css" />
    <title>Recipe Generator</title>
  </head>
  <body>
    <div class="container">
    <header>
      <h1>Welcome to the recipe generator!</h1>
      <h2><em>Let's get cooking</em></h2>
    </header>
    <div class="search-bar">
    <form action="submit">
      <input type="search" placeholder="Type Ingredients" required  class="search"/>
      <button type="submit" class="search">Submit</button>
      <div class="check-box">
        <input type="checkbox" name="vegan" id="vegan" />
        <label for="vegan">vegan</label>
        <input type="checkbox" name="gluten-free" id="gluten-free" />
        <label for="gluten-free">gluten-free</label>
        <input type="checkbox" name="nut-free" id="nut-free" />
        <label for="nut-free">nut-free</label>
      </div>

    </form>
    </div>
    <div class="recipe">Recipe goes here</div>
    <footer>
      Code built by
      <a href="https://github.com/Vlove21" target="_blank">Vonnie Love</a> ,
      open-sourced on
      <a href="https://github.com/Vlove21/Recipe-generator" target="_blank"
        >gitHub</a
      >
      and hosted on
      <a href="https://recipegene.netlify.app/" target="_blank">Netlify</a> .
    </footer>
    </div>
  </body>
  <script src="src/script.js"></script>
</html>
