<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/axios@1.13.2/dist/axios.min.js"></script>
    <script src="https://unpkg.com/typewriter-effect@latest/dist/core.js"></script>
    <link rel="stylesheet" href="src/style.css" />
    <title>Recipe Generator</title>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Welcome to the recipe generator!</h1>
        <h2><em>Let's get cooking</em></h2>
      </header>
      <div class="search-bar">
        <form action="submit" id="search-bar">
          <input
            type="search"
            placeholder="Type Ingredients"
            required
            class="search"
            id="search"
          />
          <button type="submit" class="search" id="search">Submit</button>
        </form>
      </div>
      <div class="recipe hidden" id="recipe"></div>
      <footer>
        Code built by
        <a href="https://github.com/Vlove21" target="_blank">Vonnie Love</a> ,
        open-sourced on
        <a href="https://github.com/Vlove21/Recipe-generator" target="_blank"
          >gitHub</a
        >
        and hosted on
        <a href="https://recipegene.netlify.app/" target="_blank">Netlify</a> .
      </footer>
    </div>
  </body>
  <script src="src/script.js"></script>
</html>
